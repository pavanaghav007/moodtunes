<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodTunes · Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Unbounded:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/auth.css"/>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-mark">〜</div>
        <div>
          <span class="logo-name">MoodTunes</span>
          <span class="logo-sub">AI · Emotion · Music</span>
        </div>
      </div>

      <h1 class="auth-title">Create Account</h1>
      <p class="auth-desc">Join MoodTunes — let AI detect your emotion and play the perfect song</p>

      <div class="alert alert-error"   id="errBox" style="display:none"></div>
      <div class="alert alert-success" id="okBox"  style="display:none"></div>

      <div class="field">
        <label class="field-label">Username</label>
        <div class="field-wrap">
          <span class="field-icon">👤</span>
          <input id="username" class="field-input" type="text" placeholder="Choose a username" autocomplete="username"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Email</label>
        <div class="field-wrap">
          <span class="field-icon">📧</span>
          <input id="email" class="field-input" type="email" placeholder="you@email.com" autocomplete="email"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input id="password" class="field-input" type="password" placeholder="Min 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          <button class="eye-btn" type="button" onclick="toggleEye('password',this)">👁</button>
        </div>
        <div class="pwd-strength">
          <div class="pwd-bar" id="bar1"></div>
          <div class="pwd-bar" id="bar2"></div>
          <div class="pwd-bar" id="bar3"></div>
        </div>
        <p class="pwd-hint" id="pwdHint">Enter a password</p>
      </div>

      <div class="field">
        <label class="field-label">Confirm Password</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input id="confirm" class="field-input" type="password" placeholder="Repeat password" autocomplete="new-password"/>
          <button class="eye-btn" type="button" onclick="toggleEye('confirm',this)">👁</button>
        </div>
      </div>

      <button class="btn-auth" id="regBtn" onclick="doRegister()">
        <span class="btn-shine"></span>
        <span class="btn-txt">Create My Account</span>
      </button>

      <div class="auth-divider"><span>start your journey</span></div>
      <div class="auth-emotions">🎵 😄 😢 😠 😐 😲 💕 🔥 🙏</div>

      <p class="auth-switch">
        Already have an account? <a href="/login" class="auth-link">Login →</a>
      </p>
    </div>
  </div>

  <script>
    async function doRegister() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.getElementById('regBtn');
      hideAlerts();

      if (!username || !email || !password || !confirm) { showErr('All fields are required'); return; }
      if (username.length < 3)  { showErr('Username must be at least 3 characters'); return; }
      if (password.length < 6)  { showErr('Password must be at least 6 characters'); return; }
      if (password !== confirm) { showErr('Passwords do not match'); return; }

      btn.disabled = true;
      btn.querySelector('.btn-txt').textContent = 'Creating account…';

      try {
        const res  = await fetch('/api/register', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          showOk('Account created! Welcome to MoodTunes 🎵');
          setTimeout(() => window.location.href = '/', 1000);
        } else {
          showErr(data.error || 'Registration failed');
          btn.disabled = false;
          btn.querySelector('.btn-txt').textContent = 'Create My Account';
        }
      } catch(e) {
        showErr('Server error — is Flask running?');
        btn.disabled = false;
        btn.querySelector('.btn-txt').textContent = 'Create My Account';
      }
    }

    function checkStrength(pwd) {
      const bars = ['bar1','bar2','bar3'];
      let level  = 0;
      if (pwd.length >= 6)  level++;
      if (pwd.length >= 10) level++;
      if (/[A-Z]/.test(pwd) && /[0-9]/.test(pwd)) level++;

      const cls   = ['','weak','medium','strong'];
      const hints = ['Enter a password','Weak — make it longer','Medium — add numbers/capitals','Strong password!'];
      bars.forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'pwd-bar' + (i < level ? ' ' + cls[level] : '');
      });
      document.getElementById('pwdHint').textContent = hints[level];
    }

    function toggleEye(id, btn) {
      const el = document.getElementById(id);
      el.type  = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁' : '🙈';
    }

    function showErr(msg) { const el = document.getElementById('errBox'); el.textContent = msg; el.style.display = 'block'; }
    function showOk(msg)  { const el = document.getElementById('okBox');  el.textContent = msg; el.style.display = 'block'; }
    function hideAlerts() { document.getElementById('errBox').style.display = 'none'; document.getElementById('okBox').style.display = 'none'; }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
  </script>
</body>
</html>
